input{

select{

#output{

body.light{

body.light button{

.theme-toggle{

position:absolute;

top:20px;

left:20px;

display:flex;

align-items:center;

gap:10px;

}

.switch{
    position:relative;
    display:inline-block;

    width:60px;
    height:34px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:#555;
    border-radius:34px;
    cursor:pointer;
    transition:.25s;
}

.slider::before{

    content:"";
    position:absolute;
    width:26px;
    height:26px;
    left:4px;
    bottom:4px;
    background:white;
    border-radius:50%;
    transition:.25s;
}

input:checked + .slider{
    background:#2563eb;
}

input:checked + .slider::before{
    transform:translateX(26px);
}

body.light{
    background:#ffffff;
    color:#000000;
}

body.light #name,
body.light select,
body.light #output{
    background:#ffffff;
    color:#000000;
    border:1px solid #cccccc;
}

body.light select option{
    background:#ffffff;
    color:#000000;
}

body.light button{
    background:#2563eb;
}

.result-toggle{
position:absolute;
top:70px;
left:20px;
display:flex;
align-items:center;
gap:10px;
}

#resultLabel{
font-weight:bold;
}

.hidden{
display:none;
}

    background:#111827;

.saved-tab h2{

.student-grid{

}

.student-card{

    padding:14px;
    border-radius:14px;
    background:#0c1824;
    border:1px solid #374151;
    min-height:70px;

.student-name{

.student-info{

.student-actions{

    right:10px;

.student-card:hover .student-actions{

.student-action{

    margin:0;

    color:#ffffff;
    border:0;

body.light .saved-tab,

function inferSkill(short){

    const s = short.toLowerCase();

    if(s.includes("front crawl")) return "front crawl";
    if(s.includes("back crawl")) return "back crawl";
    if(s.includes("breaststroke")) return "breaststroke";
    if(s.includes("flutter")) return "flutter kick";
    if(s.includes("whip")) return "whip kick";
    if(s.includes("eggbeater")) return "eggbeater";
    if(s.includes("scissor")) return "scissor kick";
    if(s.includes("tread")) return "treading";
    if(s.includes("glide")) return "glide";
    if(s.includes("float")) return "float";
    if(s.includes("roll")) return "roll";
    if(s.includes("head-up")) return "head-up swim";
    if(s.includes("surface")) return "surface dive";
    if(s.includes("carry")) return "object carry";
    if(s.includes("rescue")) return "rescue";
    if(s.includes("victim")) return "victim rescue";
    if(s.includes("support")) return "surface support";

    return short;
}

function fillSelect(select,items){
select.innerHTML="";

items.forEach(item=>{
const option = document.createElement("option");
option.textContent = item.short;
option.value = item.full;
option.dataset.short = item.short;
option.dataset.skill = item.skill || inferSkill(item.short);
select.appendChild(option);
});

}

function makePositiveFromWorkOn(item){

const skill = item.skill || inferSkill(item.short);

return{
short:item.short,
skill:skill,
full:item.nice
};

}

function updateMenus(){

const level = document.getElementById("level").value;
const levelData = levels[level];
const levelPositives = levelData.workOn.map(makePositiveFromWorkOn);
fillSelect(document.getElementById("positive1"),levelPositives);
fillSelect(document.getElementById("positive2"),levelPositives);
document.querySelectorAll(".work").forEach(menu=>{fillSelect(menu,levelData.workOn);});
}

function fixCapitalization(text){
text = text.toLowerCase();
text = text.replace(/(^\w)|([.!?]\s+\w)/g,match => match.toUpperCase());
return text;
}

function generateComment(){
const name = document.getElementById("name").value.trim();
const positive1 = document.getElementById("positive1");
const positive2 = document.getElementById("positive2");
const positiveText1 = positive1.value;
const positiveText2 = positive2.value;
const positiveSkill2 = positive2.selectedOptions[0].dataset.skill;
const work = [...document.querySelectorAll(".work")];
const opening = openings[Math.floor(Math.random()*openings.length)];
const ending = endings[Math.floor(Math.random()*endings.length)];
const isFail = document.getElementById("passSwitch").checked;

let comment;
if(isFail){
comment = `${opening} ${name}! Nice work on your ${positiveText1} For your ${work[0].selectedOptions[0].dataset.skill}, ${work[0].value}. Also for your ${work[1].selectedOptions[0].dataset.skill}, ${work[1].value} Finally for your ${work[2].selectedOptions[0].dataset.skill}, ${work[2].value} ${ending}`;
}else{
comment = `${opening} ${name}! Nice work on your ${positiveText1} For your ${work[0].selectedOptions[0].dataset.skill}, ${work[0].value} Also for your ${work[1].selectedOptions[0].dataset.skill}, ${work[1].value} Great improvement in your ${positiveText2} ${ending}`;
}
document.getElementById("output").textContent = fixCapitalization(comment);
}

function copyComment(){
const name = document.getElementById("name").value;
const level = levels[document.getElementById("level").value].name;
const instructor = document.getElementById("instructor").value;
const season = document.getElementById("season").value;
const year = document.getElementById("year").value;
const date = `${season} ${year}`;
const next = getNextLevelName();
const output = document.getElementById("output");
const comment =(output.value || output.textContent).trim();

const finalText = 
`Name: ${name}
Level: ${level}
Instructor: ${instructor}
Date: ${date}
Please Register In: ${next}
Success & Challenges:${comment}`;
navigator.clipboard.writeText(finalText);
}

function setup(){

document.getElementById("passSwitch").addEventListener("change",function(){
document.getElementById("resultLabel").textContent = this.checked
?
"FAIL"
:
"PASS";
updatePassFailMenus();
}
);

const levelSelect = document.getElementById("level");

Object.keys(levels).forEach(key=>{
const option = document.createElement("option");
option.value = key;
option.textContent = levels[key].name;
levelSelect.appendChild(option);
});
fillYears();
updateMenus();
}

function toggleTheme(){
document.body.classList.toggle("light");
document.getElementById("themeLabel").textContent = document.body.classList.contains("light")
?
"LIGHT"
:
"DARK";
}

function updatePassFailMenus(){
const isFail =
document.getElementById("passSwitch").checked;
document.getElementById("passOnly").classList.toggle("hidden",isFail);
document.getElementById("failOnly").classList.toggle("hidden",!isFail);
}

function getNextLevelName(){
    const keys = Object.keys(levels);
    const currentKey = document.getElementById("level").value;
    const index = keys.indexOf(currentKey);
    if(document.getElementById("passSwitch").checked){
        return levels[currentKey].name;
    }

    if(index < keys.length - 1){
        return levels[keys[index + 1]].name;
    }

    return levels[currentKey].name;
}

function fillYears(){
    const yearSelect = document.getElementById("year");
    yearSelect.innerHTML = "";
    for(let year = 2026; year <= 2040; year++){
        const option = document.createElement("option");
        option.value = year;
        option.textContent = year;
        yearSelect.appendChild(option);
    }
}

function getCurrentStudentData(){
let output = document.getElementById("output");
if((output.value || output.textContent).trim() === ""){
    generateComment();
}
output = document.getElementById("output");
return {
    name:document.getElementById("name").value.trim(),
    instructor:document.getElementById("instructor").value.trim(),
    season:document.getElementById("season").value,
    year:document.getElementById("year").value,
    levelKey:document.getElementById("level").value,
    level:levels[document.getElementById("level").value].name,
    passFail:document.getElementById("passSwitch").checked ? "FAIL" : "PASS",
    nextLevel:getNextLevelName(),
    comment:(output.value || output.textContent).trim()
};
}

function saveStudent(){
const student = getCurrentStudentData();
if(student.name === ""){
    alert("Enter the student's name before saving.");
    return;
}
if(editingStudentIndex === null){
    savedStudents.push(student);
}else{
    savedStudents[editingStudentIndex] = student;
    editingStudentIndex = null;
    document.getElementById("saveStudentButton").textContent = "Save Student";
}
localStorage.setItem("savedSwimStudents",JSON.stringify(savedStudents));
renderSavedStudents();
}

function renderSavedStudents(){
const list = document.getElementById("studentList");
list.innerHTML = "";
savedStudents.forEach((student,index)=>{
const card = document.createElement("div");
card.className = "student-card";
card.innerHTML =
`<div class="student-actions">
<button class="student-action" type="button" onclick="editStudent(${index})">✏️</button>
<button class="student-action delete" type="button" onclick="deleteStudent(${index})">🗑️</button>
</div>
<div class="student-name">${student.name}</div>
<div class="student-info">${student.level}</div>
<div class="student-info">${student.passFail}</div>`;
list.appendChild(card);
});
}

function deleteStudent(index){
savedStudents.splice(index,1);
localStorage.setItem("savedSwimStudents",JSON.stringify(savedStudents));
renderSavedStudents();
}

function deleteAllStudents(){
if(savedStudents.length === 0){
    return;
}
if(!confirm("Delete all saved students?")){
    return;
}
savedStudents = [];
editingStudentIndex = null;
localStorage.removeItem("savedSwimStudents");
document.getElementById("saveStudentButton").textContent = "Save Student";
renderSavedStudents()
}

function editStudent(index){

const student = savedStudents[index];

editingStudentIndex = index;

const levelSelect = document.getElementById("level");

levelSelect.value = student.levelKey;

updateMenus();

document.getElementById("name").value = student.name;
document.getElementById("instructor").value = student.instructor;
document.getElementById("season").value = student.season;
document.getElementById("year").value = student.year;
document.getElementById("passSwitch").checked = student.passFail === "FAIL";
document.getElementById("resultLabel").textContent = student.passFail;
document.getElementById("output").value = student.comment;

document.getElementById("saveStudentButton").textContent = "Update Student";

updatePassFailMenus();

window.scrollTo({top:0,behavior:"smooth"});

}

function loadSavedStudents(){

const saved = localStorage.getItem("savedSwimStudents");

if(saved){
    savedStudents = JSON.parse(saved);
}
}

async function exportPDF(){

try{

if(savedStudents.length === 0){
    alert("Save at least one student before exporting.");
    return;
}

const existingPdf = await fetch("ZFillableComments.pdf");

if(!existingPdf.ok){
alert("PDF not found. The file must be named exactly ZFillableComments.pdf and be in the same folder as the HTML.");
return;
}

const bytes = await existingPdf.arrayBuffer();
const templatePdf = await PDFLib.PDFDocument.load(bytes);
const templateForm = templatePdf.getForm();

templateForm.flatten();
const pdf = await PDFLib.PDFDocument.create();
const font = await pdf.embedFont(PDFLib.StandardFonts.Helvetica);
const form = pdf.getForm();
const fieldBoxes = [
{
name:[107,705.5,228,723.5],
level:[107,681.5,228,699.5],
instructor:[107,657.5,228,675.5],
date:[107,633.5,228,651.5],
next:[150,585.5,228,603.5],
comment:[255,552,555,718]
},
{
name:[107,479,228,497],
level:[107,455,228,473],
instructor:[107,431,228,449],
date:[107,407,228,425],
next:[150,359,228,377],
comment:[255,322,555,492]
},
{
name:[107,246.5,228,264.5],
level:[107,222.5,228,240.5],
instructor:[107,198.5,228,216.5],
date:[107,174.5,228,192.5],
next:[150,126,228,144],
comment:[255,92,555,258]
}
];

function addField(page,name,text,box,size,multiline){

const field = form.createTextField(name);

field.setText(text);

if(multiline){
field.enableMultiline();
}

field.acroField.setDefaultAppearance(
`/${font.name} ${size} Tf 0 g`
);

const x = box[0];
const y = box[1];
const width = box[2] - box[0];
const height = box[3] - box[1];

field.addToPage(page,{
x:x,
y:y,
width:width,
height:height,
borderWidth:0,
borderColor:PDFLib.rgb(1,1,1),
backgroundColor:PDFLib.rgb(1,1,1)
});

field.acroField.getWidgets().forEach(widget => {
widget.dict.delete(PDFLib.PDFName.of("Border"));
widget.dict.delete(PDFLib.PDFName.of("BS"));
});

}

const pagesNeeded = Math.ceil(savedStudents.length / 3);
for(let pageIndex = 0; pageIndex < pagesNeeded; pageIndex++){
const copiedPages = await pdf.copyPages(templatePdf,[0]);
const page = copiedPages[0];

pdf.addPage(page);

for(let slot = 0; slot < 3; slot++){

const studentIndex =
pageIndex * 3 + slot;

if(studentIndex >= savedStudents.length){
    continue;
}
const student = savedStudents[studentIndex];
const box = fieldBoxes[slot];
const prefix = `student_${studentIndex + 1}`;

addField(page,`${prefix}_name`,student.name,box.name,10,false);
addField(page,`${prefix}_level`,student.level,box.level,10,false);
addField(page,`${prefix}_instructor`,student.instructor,box.instructor,10,false);
addField(page,`${prefix}_date`,`${student.season} ${student.year}`,box.date,10,false);
addField(page,`${prefix}_next`,student.nextLevel,box.next,10,false);
addField(page,`${prefix}_comment`,student.comment,box.comment,11,true);

}

}

form.updateFieldAppearances(font);

const result = await pdf.save();

const blob =
new Blob(
[result],
{
type:"application/pdf"
}
);

const url = URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = "SwimComments.pdf";
a.click();
}catch(error){
console.error(error);
alert(error.message);

}

}

setup();
updatePassFailMenus();
loadSavedStudents();
renderSavedStudents();
</script>
